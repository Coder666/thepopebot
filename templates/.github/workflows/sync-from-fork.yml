name: Sync from Fork

on:
  schedule:
    - cron: '0 4 * * *'  # nightly at 4 AM
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to sync (default: main)'
        required: false
        default: 'main'

jobs:
  sync:
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Sync branch from fork to this repo
        env:
          SYNC_BRANCH: ${{ github.event.inputs.branch || 'main' }}
          FORK_REPO_URL: ${{ vars.FORK_REPO_URL }}
          GITEA_TOKEN: ${{ secrets.AGENT_GITEA_TOKEN }}
        run: |
          if [ -z "$FORK_REPO_URL" ]; then
            echo "ERROR: FORK_REPO_URL repo variable is not set."
            echo "Run the setup wizard (npx thepopebot setup-gitea) to configure it."
            exit 1
          fi

          TMPDIR=$(mktemp -d)

          git clone --depth 1 --branch "$SYNC_BRANCH" "$FORK_REPO_URL" "$TMPDIR"

          # Push to this Gitea repo using token auth
          GITEA_REMOTE=$(echo "$GITEA_SERVER_URL" | sed "s|://|://admin:${GITEA_TOKEN}@|")
          git -C "$TMPDIR" remote add local "${GITEA_REMOTE}/${GITEA_REPOSITORY}.git"
          git -C "$TMPDIR" push local HEAD:"$SYNC_BRANCH" --force

          rm -rf "$TMPDIR"
          echo "Synced $SYNC_BRANCH from $FORK_REPO_URL"
